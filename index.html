<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ADMIN PLANNER</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0F172A;
      --bg-secondary: #1E293B;
      --bg-card: rgba(30, 41, 59, 0.8);
      --border: rgba(255,255,255,0.06);
      --text-primary: #E2E8F0;
      --text-secondary: #94A3B8;
      --text-muted: #64748B;
      --accent: #4ADE80;
      --accent-secondary: #22D3EE;
      --urgent: #DC2626;
      --priority: #EA580C;
      --in-progress: #2563EB;
      --todo: #6B7280;
      --done: #16A34A;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%); min-height: 100vh; color: var(--text-primary); overflow-x: hidden; }
    .header { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px; }
    .logo { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-tabs { display: flex; gap: 2px; background: rgba(255,255,255,0.03); padding: 3px; border-radius: 8px; }
    .nav-tab { padding: 6px 10px; border-radius: 6px; border: none; background: transparent; color: var(--text-secondary); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .nav-tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .nav-tab.active { background: rgba(74, 222, 128, 0.15); color: var(--accent); }
    .header-actions { display: flex; gap: 6px; }
    .header-btn { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text-secondary); font-size: 10px; cursor: pointer; transition: all 0.2s; }
    .header-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
    .braindump-container { padding: 16px; max-width: 800px; margin: 0 auto; }
    .braindump-header { text-align: center; margin-bottom: 20px; }
    .braindump-header h2 { font-size: 20px; margin-bottom: 8px; }
    .braindump-header p { font-size: 13px; color: var(--text-muted); }
    .braindump-input { width: 100%; min-height: 150px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 16px; color: var(--text-primary); font-size: 14px; font-family: inherit; resize: vertical; outline: none; }
    .braindump-input:focus { border-color: var(--accent); }
    .braindump-input::placeholder { color: var(--text-muted); }
    .braindump-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .braindump-hint { font-size: 11px; color: var(--text-muted); }
    .process-btn { padding: 12px 24px; border-radius: 8px; border: none; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%); color: var(--bg-primary); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .process-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3); }
    .process-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .processing-status { margin-top: 16px; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid var(--border); }
    /* Global processing overlay */
    .processing-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
    .processing-overlay .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .processing-overlay .message { font-size: 16px; color: var(--text-primary); margin-bottom: 8px; text-align: center; max-width: 300px; }
    .processing-overlay .submessage { font-size: 12px; color: var(--text-muted); }
    .status-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-dot.error { background: var(--urgent); animation: none; }
    .status-dot.done { background: var(--done); animation: none; }
    .status-text { font-size: 13px; }
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: var(--bg-primary); }
    .btn-primary:hover { background: #22C55E; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text-primary); }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .btn-danger { background: rgba(220, 38, 38, 0.2); color: #FCA5A5; }
    .btn-danger:hover { background: rgba(220, 38, 38, 0.3); }
    .btn-sm { padding: 4px 8px; font-size: 10px; }
    .search-container { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .search-bar { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); }
    .search-bar input { background: transparent; border: none; color: var(--text-primary); font-size: 13px; width: 100%; outline: none; }
    .search-bar input::placeholder { color: var(--text-muted); }
    .board-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.04); flex-wrap: wrap; gap: 8px; }
    .board-title { font-size: 16px; font-weight: 600; }
    .view-toggle { display: flex; gap: 2px; background: rgba(255,255,255,0.03); padding: 3px; border-radius: 6px; }
    .view-btn { padding: 5px 10px; border-radius: 5px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 11px; transition: all 0.2s; }
    .view-btn:hover { color: var(--text-secondary); }
    .view-btn.active { background: rgba(255,255,255,0.08); color: var(--text-primary); }
    .kanban-container { display: flex; gap: 12px; padding: 16px; overflow-x: auto; min-height: calc(100vh - 280px); -webkit-overflow-scrolling: touch; scroll-behavior: smooth; cursor: grab; }
    .kanban-container:active { cursor: grabbing; }
    .bucket { background: rgba(255,255,255,0.02); border-radius: 10px; min-width: 280px; max-width: 280px; border: 1px solid var(--border); display: flex; flex-direction: column; max-height: calc(100vh - 180px); transition: transform 0.2s, border-color 0.2s; }
    .bucket.dragging { opacity: 0.5; }
    .bucket.drag-left { border-left: 3px solid var(--accent); }
    .bucket.drag-right { border-right: 3px solid var(--accent); }
    .bucket-drag-handle { cursor: grab; padding: 4px 6px; margin-right: 4px; color: var(--text-muted); font-size: 12px; opacity: 0.5; transition: opacity 0.2s; }
    .bucket-header:hover .bucket-drag-handle { opacity: 1; }
    .bucket-drag-handle:active { cursor: grabbing; }
    .bucket-header { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .bucket-name { font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: background 0.2s; }
    .bucket-name:hover { background: rgba(255,255,255,0.05); }
    .bucket-name-input { font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(255,255,255,0.1); border: 1px solid var(--accent); border-radius: 4px; color: var(--text-primary); padding: 2px 4px; outline: none; width: 150px; }
    .bucket-actions { display: flex; align-items: center; gap: 8px; }
    .bucket-count { background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 10px; font-size: 10px; color: var(--text-muted); }
    .bucket-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; opacity: 0; transition: opacity 0.2s; }
    .bucket-header:hover .bucket-delete { opacity: 1; }
    .bucket-delete:hover { color: var(--urgent); }
    .bucket-body { flex: 1; overflow-y: auto; padding: 8px; }
    .add-task-inline { padding: 8px 10px; margin-bottom: 8px; background: rgba(255,255,255,0.02); border-radius: 6px; border: 1px dashed rgba(255,255,255,0.08); color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .add-task-inline:hover { background: rgba(255,255,255,0.04); }
    .task-list { display: flex; flex-direction: column; gap: 8px; min-height: 50px; }
    .task-list.drag-over { background: rgba(74, 222, 128, 0.05); border-radius: 6px; }
    .add-bucket-column { min-width: 200px; max-width: 200px; background: rgba(255,255,255,0.01); border: 1px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; color: var(--text-muted); font-size: 13px; }
    .add-bucket-column:hover { background: rgba(255,255,255,0.03); border-color: var(--accent); color: var(--accent); }
    .task-card { background: var(--bg-card); border-radius: 8px; padding: 10px; border: 1px solid var(--border); border-left: 3px solid var(--todo); transition: all 0.2s; cursor: grab; }
    .task-card:hover { background: rgba(30, 41, 59, 1); transform: translateY(-1px); }
    .task-card.dragging { opacity: 0.5; }
    .task-card.drag-above { border-top: 2px solid var(--accent); margin-top: -2px; }
    .task-card.drag-below { border-bottom: 2px solid var(--accent); margin-bottom: -2px; }
    .task-card.urgent { border-left-color: var(--urgent); }
    .task-card.priority { border-left-color: var(--priority); }
    .task-card.in-progress { border-left-color: var(--in-progress); }
    .task-card.done { border-left-color: var(--done); opacity: 0.7; }
    .task-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
    .task-title-row { display: flex; align-items: flex-start; gap: 6px; flex: 1; }
    .expand-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; font-size: 10px; }
    .task-title { font-size: 12px; font-weight: 500; line-height: 1.4; }
    .task-menu { color: var(--text-muted); opacity: 0; background: none; border: none; cursor: pointer; font-size: 14px; }
    .task-card:hover .task-menu { opacity: 1; }
    .checklist { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; }
    .checklist-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-secondary); cursor: pointer; padding: 6px 8px; border-radius: 4px; transition: all 0.15s; margin: 0 -8px; }
    .checklist-item:hover { background: rgba(255,255,255,0.05); }
    .checklist-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; pointer-events: none; flex-shrink: 0; }
    .checklist-item span { flex: 1; }
    .checklist-item span.done { text-decoration: line-through; color: var(--text-muted); }
    .checklist-item.completed { opacity: 0.6; background: rgba(22, 163, 74, 0.05); }
    .checklist-item.completed:hover { opacity: 0.8; }
    .task-footer { margin-top: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .task-meta { font-size: 10px; color: var(--text-muted); }
    .due-date { font-size: 10px; padding: 2px 6px; background: rgba(255,255,255,0.05); border-radius: 4px; font-family: 'SF Mono', Monaco, monospace; color: var(--text-muted); }
    .due-date.overdue { background: rgba(220, 38, 38, 0.2); color: #FCA5A5; }
    .status-badge { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
    .status-badge.urgent { background: rgba(220, 38, 38, 0.2); color: #FCA5A5; }
    .status-badge.priority { background: rgba(234, 88, 12, 0.2); color: #FDBA74; }
    .status-badge.in-progress { background: rgba(37, 99, 235, 0.2); color: #93C5FD; }
    .status-badge.todo { background: rgba(107, 114, 128, 0.2); color: #9CA3AF; }
    .status-badge.done { background: rgba(22, 163, 74, 0.2); color: #86EFAC; }
    .crm-container { padding: 16px; }
    .crm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .crm-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; flex: 1; }
    .stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 14px; cursor: pointer; transition: all 0.2s; }
    .stat-card:hover { background: rgba(255,255,255,0.06); border-color: var(--accent); }
    .stat-card.active { background: rgba(74, 222, 128, 0.1); border-color: var(--accent); }
    .crm-filter-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); align-items: center; }
    .crm-filter-bar select { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text-primary); font-size: 11px; outline: none; cursor: pointer; min-width: 120px; }
    .crm-filter-bar select:focus { border-color: var(--accent); }
    .crm-filter-bar select option { background: var(--bg-secondary); }
    .filter-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-right: -4px; }
    .filter-count { font-size: 10px; padding: 2px 8px; background: rgba(74, 222, 128, 0.2); color: var(--accent); border-radius: 10px; margin-left: auto; }
    .clear-filters-btn { font-size: 11px; padding: 6px 10px; background: rgba(220, 38, 38, 0.1); color: #FCA5A5; border: 1px solid rgba(220, 38, 38, 0.3); border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .clear-filters-btn:hover { background: rgba(220, 38, 38, 0.2); }

    /* Cloud Sync Indicator */
    .sync-indicator { background: rgba(74, 222, 128, 0.15) !important; border-color: rgba(74, 222, 128, 0.3) !important; color: var(--accent) !important; }
    .sync-indicator.syncing { animation: syncPulse 1s infinite; }
    .sync-indicator.disconnected { background: rgba(107, 114, 128, 0.15) !important; border-color: rgba(107, 114, 128, 0.3) !important; color: var(--text-muted) !important; }
    .sync-indicator.error { background: rgba(220, 38, 38, 0.15) !important; border-color: rgba(220, 38, 38, 0.3) !important; color: #FCA5A5 !important; }
    @keyframes syncPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .sync-id-display { font-family: 'SF Mono', Monaco, monospace; font-size: 12px; padding: 6px 10px; background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.2); border-radius: 6px; color: var(--accent); letter-spacing: 1px; user-select: all; }
    .device-count { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .device-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .crm-actions { display: flex; gap: 8px; }
    .contact-list { display: flex; flex-direction: column; gap: 8px; }
    .contact-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; cursor: pointer; }
    .contact-card:hover { background: rgba(255,255,255,0.04); }
    .contact-avatar { width: 40px; height: 40px; border-radius: 8px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--bg-primary); flex-shrink: 0; }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 13px; font-weight: 500; }
    .contact-detail { font-size: 11px; color: var(--text-muted); }
    .contact-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .contact-tag { font-size: 9px; padding: 2px 6px; border-radius: 3px; background: rgba(255,255,255,0.05); color: var(--text-secondary); }
    .contact-tag.geo { background: rgba(34, 211, 238, 0.15); color: #22D3EE; }
    .contact-tag.sec { background: rgba(168, 85, 247, 0.15); color: #C084FC; }
    .contact-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .next-step-badge { font-size: 10px; padding: 3px 8px; background: rgba(74, 222, 128, 0.15); color: var(--accent); border-radius: 4px; font-weight: 500; }
    .next-step-badge.overdue { background: rgba(220, 38, 38, 0.15); color: #FCA5A5; }
    .contact-date { font-size: 10px; color: var(--text-muted); font-family: 'SF Mono', Monaco, monospace; }
    .today-container { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    @media (min-width: 768px) { .today-container { display: grid; grid-template-columns: 1fr 1fr; } }
    .today-section { background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px solid var(--border); padding: 14px; max-height: 50vh; overflow-y: auto; }
    .today-section-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .count-badge { background: rgba(74, 222, 128, 0.2); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-size: 10px; }
    .count-badge.urgent { background: rgba(220, 38, 38, 0.2); color: #FCA5A5; }
    .empty-state { text-align: center; padding: 30px; color: var(--text-muted); font-size: 12px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: 100%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
    .modal h3 { font-size: 16px; margin-bottom: 16px; }
    .modal label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; }
    .modal input[type="text"], .modal input[type="date"], .modal input[type="password"], .modal select, .modal textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text-primary); font-size: 13px; margin-bottom: 12px; outline: none; font-family: inherit; }
    .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--accent); }
    .modal select option { background: var(--bg-secondary); color: var(--text-primary); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .checklist-editor { margin-bottom: 12px; }
    .checklist-editor-title { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
    /* Linked contacts in task modal */
    .linked-contacts-picker { margin-bottom: 12px; }
    .linked-contacts-list { display: flex; flex-wrap: wrap; gap: 6px; max-height: 120px; overflow-y: auto; padding: 8px; background: rgba(255,255,255,0.02); border-radius: 6px; border: 1px solid var(--border); }
    .contact-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 16px; font-size: 11px; cursor: pointer; transition: all 0.2s; }
    .contact-chip:hover { background: rgba(255,255,255,0.08); }
    .contact-chip.selected { background: var(--accent); color: #000; border-color: var(--accent); }
    .contact-chip .check { font-size: 10px; }
    /* Linked contacts on task cards */
    .task-linked-contacts { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .task-contact-chip { font-size: 9px; padding: 2px 6px; background: rgba(96, 165, 250, 0.15); color: #60a5fa; border-radius: 10px; }
    .checklist-edit-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: rgba(255,255,255,0.03); border-radius: 4px; margin-bottom: 4px; }
    .checklist-edit-item input[type="checkbox"] { accent-color: var(--accent); }
    .checklist-edit-item span { flex: 1; font-size: 12px; }
    .checklist-edit-item span.done { text-decoration: line-through; color: var(--text-muted); }
    .checklist-edit-item button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 2px 4px; }
    .checklist-edit-item button:hover { color: var(--urgent); }
    .add-checklist-row { display: flex; gap: 8px; margin-top: 8px; }
    .add-checklist-row input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; padding: 8px; color: var(--text-primary); font-size: 12px; outline: none; }
    .add-checklist-row input:focus { border-color: var(--accent); }
    .add-checklist-row button { background: var(--accent); color: var(--bg-primary); border: none; border-radius: 4px; padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg-secondary); border: 1px solid var(--accent); color: var(--text-primary); padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 1001; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* Phase 3: UI/UX Improvements */

    /* Mobile touch targets - min 44px */
    @media (max-width: 768px) {

    .done-task-card:hover { background: rgba(255,255,255,0.06); border-color: var(--done); }

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const ANTHROPIC_API_URL = 'https://api.anthropic.com/v1/messages';

    // XSS Prevention utility
    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // Escape for use in HTML attribute values (double quotes)
    function escapeAttr(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;');
    }

    const DEFAULT_CONTACTS = [
      { id: 1, name: "Austin Smith", company: "DFC", role: "Investment Officer", geoTags: ["Ethiopia"], secTags: ["Development Finance"], nextStep: "", nextStepDate: "", strength: "Strong" },
      { id: 2, name: "Dr. Girma Ababi", company: "Liyana Healthcare", role: "Founder", geoTags: ["Ethiopia"], secTags: ["Healthcare"], nextStep: "NDA signing", nextStepDate: "", strength: "New" }
    ];
    const DEFAULT_TASKS = [
      { id: 1, title: "Home Grocery", bucket: "Work Admin", checklist: ["Milk", "Eggs", "Bread"], dueDate: "", status: "todo", notes: "" },
      { id: 2, title: "TOMER FOLLOW UP", bucket: "LOGISTICS", checklist: ["List of companies"], dueDate: "2026-01-28", status: "urgent", notes: "" }
    ];
    const DEFAULT_BUCKETS = ["FUND", "HC - Sector", "LOGISTICS", "Work Admin"];

    let state = {
      view: 'kanban',
      contacts: [],
      tasks: [],
      buckets: [],
      filters: { search: '' },
      // CRM filters
      crmFilter: null, // null, 'all', 'overdue'
      crmGeoFilter: '', // selected geo tag
      crmSecFilter: '', // selected sector tag
      crmStrengthFilter: '', // selected strength
      crmLastContactedFilter: '', // 'week', 'month', '30days_ago', '90days_ago'
      expandedTasks: new Set(),
      modal: null,
      modalChecklist: [],
      modalLinkedContacts: [],
      newChecklistText: '',
      toast: null,
      apiKey: '',
      editingBucket: null,
      processing: null,
      // Cloud sync (Firebase)
      syncId: '',
      syncStatus: null, // null, 'connecting', 'connected', 'syncing', 'error', 'disconnected'
      lastSynced: null,
      syncEnabled: false,
      deviceCount: 0,
      firebaseConfig: null,
      // Legacy sync (kept for manual sync code copy)
      autoSync: false,
      // Brave Search API
      braveApiKey: '',
      // Image upload for contact scanning
      uploadedImages: [],    // Array of {dataUrl, name} objects
      pendingContacts: [],   // Contacts extracted, awaiting confirmation
      selectedPendingContacts: new Set(), // IDs of contacts selected for import
      pendingCrmUpdates: [],  // Quick CRM updates awaiting confirmation
      // Brain dump images (for OCR)
      braindumpImages: [],   // Array of {dataUrl, name} objects for OCR processing
      // Done tasks visibility
      showDoneTasks: false
    };

    function loadData() {
      try {
        const saved = localStorage.getItem('admin_planner_data_v4');
        if (saved) {
          const data = JSON.parse(saved);
          state.contacts = Array.isArray(data.contacts) ? data.contacts : DEFAULT_CONTACTS;
          state.tasks = Array.isArray(data.tasks) ? data.tasks : DEFAULT_TASKS;
          state.buckets = Array.isArray(data.buckets) ? data.buckets : DEFAULT_BUCKETS;
          state.apiKey = data.apiKey || '';
          state.braveApiKey = data.braveApiKey || '';
        } else {
          state.contacts = [...DEFAULT_CONTACTS];
          state.tasks = [...DEFAULT_TASKS];
          state.buckets = [...DEFAULT_BUCKETS];
        }
      } catch (e) {
        console.error('Failed to load data:', e);
        state.contacts = [...DEFAULT_CONTACTS];
        state.tasks = [...DEFAULT_TASKS];
        state.buckets = [...DEFAULT_BUCKETS];
        // Show error toast after render is available
        setTimeout(() => {
          showToast('Data load failed. Using defaults. Check Settings to import backup.');
        }, 100);
      }
    }

    function saveData() {
      try {
        localStorage.setItem('admin_planner_data_v4', JSON.stringify({
          contacts: state.contacts,
          tasks: state.tasks,
          buckets: state.buckets,
          apiKey: state.apiKey,
          braveApiKey: state.braveApiKey
        }));
      } catch (e) {
        console.error('Failed to save data:', e);
        showToast('Save failed! Storage may be full. Export your data.');
      }
    }

    function isOverdue(d) { return d && new Date(d) < new Date(new Date().toDateString()); }
    function isToday(d) { return d && new Date(d).toDateString() === new Date().toDateString(); }
    function formatDate(d) { return d ? new Date(d).toLocaleDateString('en-US', { month: '2-digit', day: '2-digit' }) : ''; }
    function getInitials(n) { return n.split(' ').map(x => x[0]).join('').slice(0, 2).toUpperCase(); }
    function showToast(m) { state.toast = m; render(); setTimeout(() => { state.toast = null; render(); }, 3000); }
    function getNextId(items) { return Math.max(0, ...items.map(i => i.id)) + 1; }
    function filterTasks(tasks) { const s = state.filters.search.toLowerCase(); return s ? tasks.filter(t => t.title.toLowerCase().includes(s) || (t.checklist && t.checklist.some(c => c.toLowerCase().includes(s)))) : tasks; }
    function getTasksByBucket(b) { return filterTasks(state.tasks.filter(t => t.bucket === b)); }
    function getTodayItems() { return { tasks: state.tasks.filter(t => t.status === 'urgent' || isToday(t.dueDate) || isOverdue(t.dueDate)), contacts: state.contacts.filter(c => c.nextStep && (isToday(c.nextStepDate) || isOverdue(c.nextStepDate))) }; }

    function setView(v) { state.view = v; render(); }
    function handleSearch(v) { state.filters.search = v; render(); }

    // CRM Filter functions
    function setCrmFilter(f) {
      state.crmFilter = state.crmFilter === f ? null : f;
      render();
    }

    function setCrmGeoFilter(v) { state.crmGeoFilter = v; render(); }
    function setCrmSecFilter(v) { state.crmSecFilter = v; render(); }
    function setCrmStrengthFilter(v) { state.crmStrengthFilter = v; render(); }
    function setCrmLastContactedFilter(v) { state.crmLastContactedFilter = v; render(); }

    function clearAllCrmFilters() {
      state.crmFilter = null;
      state.crmGeoFilter = '';
      state.crmSecFilter = '';
      state.crmStrengthFilter = '';
      state.crmLastContactedFilter = '';
      state.filters.search = '';
      render();
    }

    function getActiveFilterCount() {
      let count = 0;
      if (state.crmFilter) count++;
      if (state.crmGeoFilter) count++;
      if (state.crmSecFilter) count++;
      if (state.crmStrengthFilter) count++;
      if (state.crmLastContactedFilter) count++;
      if (state.filters.search) count++;
      return count;
    }

    function isWithinDays(dateStr, days) {
      if (!dateStr) return false;
      const d = new Date(dateStr);
      const now = new Date();
      const diff = (now - d) / (1000 * 60 * 60 * 24);
      return diff <= days && diff >= 0;
    }

    function isOlderThanDays(dateStr, days) {
      if (!dateStr) return true; // No date means never contacted
      const d = new Date(dateStr);
      const now = new Date();
      const diff = (now - d) / (1000 * 60 * 60 * 24);
      return diff > days;
    }

    function filterContacts(contacts) {
      return contacts.filter(c => {
        // Search filter
        const s = state.filters.search.toLowerCase();
        if (s && !c.name.toLowerCase().includes(s) && !c.company.toLowerCase().includes(s)) {
          return false;
        }

        // Stat card filter (Total/Overdue)
        if (state.crmFilter === 'overdue' && !isOverdue(c.nextStepDate)) {
          return false;
        }

        // Geo tag filter
        if (state.crmGeoFilter && !(c.geoTags || []).includes(state.crmGeoFilter)) {
          return false;
        }

        // Sector tag filter
        if (state.crmSecFilter && !(c.secTags || []).includes(state.crmSecFilter)) {
          return false;
        }

        // Strength filter
        if (state.crmStrengthFilter && c.strength !== state.crmStrengthFilter) {
          return false;
        }

        // Last contacted filter
        if (state.crmLastContactedFilter) {
          switch (state.crmLastContactedFilter) {
            case 'week':
              if (!isWithinDays(c.lastContactedDate, 7)) return false;
              break;
            case 'month':
              if (!isWithinDays(c.lastContactedDate, 30)) return false;
              break;
            case '30days_ago':
              if (!isOlderThanDays(c.lastContactedDate, 30)) return false;
              break;
            case '90days_ago':
              if (!isOlderThanDays(c.lastContactedDate, 90)) return false;
              break;
          }
        }

        return true;
      });
    }

    function getUniqueGeoTags() {
      return [...new Set(state.contacts.flatMap(c => c.geoTags || []))].sort();
    }

    function getUniqueSecTags() {
      return [...new Set(state.contacts.flatMap(c => c.secTags || []))].sort();
    }

    function getUniqueStrengths() {
      return [...new Set(state.contacts.map(c => c.strength).filter(Boolean))].sort();
    }
    function toggleTaskExpand(id) { state.expandedTasks.has(id) ? state.expandedTasks.delete(id) : state.expandedTasks.add(id); render(); }

    function markTaskDone(taskId, e) {
      if (e) e.stopPropagation();
      const task = state.tasks.find(t => t.id === taskId);
      if (task) {
        task.status = task.status === 'done' ? 'todo' : 'done';
        saveData();
        render();
        if (task.status === 'done') {
          showToast('Task completed!');
        }
      }
    }

    function toggleDoneTasksVisibility() {
      state.showDoneTasks = !state.showDoneTasks;
      render();
    }

    function getDoneTasks() {
      return state.tasks.filter(t => t.status === 'done');
    }

    function getActiveTasks() {
      return state.tasks.filter(t => t.status !== 'done');
    }

    function toggleChecklistItem(taskId, idx, e) {
      e.stopPropagation();
      const t = state.tasks.find(x => x.id === taskId);
      if (t && t.checklist) {
        const item = t.checklist[idx];
        // Toggle the checked state
        t.checklist[idx] = item.startsWith('[x] ') ? item.replace('[x] ', '') : '[x] ' + item;
        // Sort checklist: unchecked items first, checked items at bottom
        t.checklist = sortChecklist(t.checklist);
        saveData();
        render();
      }
    }

    function sortChecklist(checklist) {
      // Separate completed and incomplete items
      const incomplete = checklist.filter(item => !item.startsWith('[x] '));
      const complete = checklist.filter(item => item.startsWith('[x] '));
      // Return incomplete first, then complete
      return [...incomplete, ...complete];
    }
    
    function addNewBucket() {
      const n = prompt('New bucket name:');
      if (n && n.trim()) {
        const trimmed = n.trim();
        // Check for duplicate bucket names
        if (state.buckets.some(b => b.toLowerCase() === trimmed.toLowerCase())) {
          showToast('Bucket "' + trimmed + '" already exists');
          return;
        }
        state.buckets.push(trimmed);
        saveData();
        render();
        showToast('Bucket created');
      }
    }

    function startRenameBucket(b) {
      state.editingBucket = b;
      render();
      setTimeout(() => {
        const i = document.getElementById('bucketNameInput');
        if (i) { i.focus(); i.select(); }
      }, 50);
    }

    function finishRenameBucket(old, neu) {
      if (neu && neu.trim() && neu !== old) {
        const trimmed = neu.trim();
        // Check for empty name
        if (!trimmed) {
          showToast('Bucket name cannot be empty');
          state.editingBucket = null;
          render();
          return;
        }
        // Check for duplicate bucket names (excluding current bucket)
        if (state.buckets.some(b => b !== old && b.toLowerCase() === trimmed.toLowerCase())) {
          showToast('Bucket "' + trimmed + '" already exists');
          state.editingBucket = null;
          render();
          return;
        }
        const i = state.buckets.indexOf(old);
        if (i !== -1) {
          state.buckets[i] = trimmed;
          state.tasks.forEach(t => { if (t.bucket === old) t.bucket = trimmed; });
          saveData();
        }
      }
      state.editingBucket = null;
      render();
    }

    function deleteBucket(b) {
      const tasksInBucket = state.tasks.filter(t => t.bucket === b).length;
      const message = tasksInBucket > 0
        ? 'Delete bucket "' + b + '"? ' + tasksInBucket + ' task(s) will be moved to "Work Admin".'
        : 'Delete bucket "' + b + '"?';

      if (confirm(message)) {
        // Find a valid target bucket for reassignment
        let targetBucket = 'Work Admin';
        if (!state.buckets.includes(targetBucket)) {
          // If Work Admin doesn't exist, use first available bucket (excluding the one being deleted)
          targetBucket = state.buckets.find(x => x !== b);
          if (!targetBucket) {
            // If no other buckets, create Work Admin
            state.buckets.push('Work Admin');
            targetBucket = 'Work Admin';
          }
        }

        state.tasks.forEach(t => { if (t.bucket === b) t.bucket = targetBucket; });
        state.buckets = state.buckets.filter(x => x !== b);
        saveData();
        render();
        showToast('Bucket deleted');
      }
    }

    // Drag and drop with reorder support
    let draggedTaskId = null;
    let dragOverTaskId = null;
    let dragPosition = null;

    // Bucket drag reordering
    let draggedBucket = null;
    let dragOverBucket = null;

    function handleBucketDragStart(e, bucket) {
      draggedBucket = bucket;
      e.target.closest('.bucket').classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleBucketDragEnd(e) {
      const bucketEl = e.target.closest('.bucket');
      if (bucketEl) bucketEl.classList.remove('dragging');
      document.querySelectorAll('.bucket').forEach(el => el.classList.remove('drag-left', 'drag-right'));
      draggedBucket = null;
      dragOverBucket = null;
    }

    function handleBucketDragOver(e, bucket) {
      e.preventDefault();
      e.stopPropagation();
      if (!draggedBucket || bucket === draggedBucket) return;

      const rect = e.currentTarget.getBoundingClientRect();
      const midX = rect.left + rect.width / 2;
      const pos = e.clientX < midX ? 'left' : 'right';

      if (dragOverBucket !== bucket) {
        document.querySelectorAll('.bucket').forEach(el => el.classList.remove('drag-left', 'drag-right'));
        e.currentTarget.classList.add('drag-' + pos);
        dragOverBucket = bucket;
      }
    }

    function handleBucketDrop(e, targetBucket) {
      e.preventDefault();
      e.stopPropagation();

      if (!draggedBucket || draggedBucket === targetBucket) return;

      const fromIdx = state.buckets.indexOf(draggedBucket);
      const toIdx = state.buckets.indexOf(targetBucket);

      if (fromIdx === -1 || toIdx === -1) return;

      // Remove from current position
      state.buckets.splice(fromIdx, 1);

      // Insert at new position
      const newToIdx = state.buckets.indexOf(targetBucket);
      const rect = e.currentTarget.getBoundingClientRect();
      const insertAfter = e.clientX > rect.left + rect.width / 2;

      if (insertAfter) {
        state.buckets.splice(newToIdx + 1, 0, draggedBucket);
      } else {
        state.buckets.splice(newToIdx, 0, draggedBucket);
      }

      saveData();
      render();
    }

    function handleDragStart(e, id) { 
      draggedTaskId = id; 
      e.target.classList.add('dragging'); 
      e.dataTransfer.effectAllowed = 'move';
    }
    
    function handleDragEnd(e) { 
      e.target.classList.remove('dragging'); 
      document.querySelectorAll('.task-card').forEach(el => el.classList.remove('drag-above', 'drag-below'));
      document.querySelectorAll('.task-list').forEach(el => el.classList.remove('drag-over')); 
      draggedTaskId = null;
      dragOverTaskId = null;
      dragPosition = null;
    }
    
    function handleTaskDragOver(e, taskId) {
      e.preventDefault();
      e.stopPropagation();
      if (taskId === draggedTaskId) return;
      
      const rect = e.currentTarget.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      const pos = e.clientY < midY ? 'above' : 'below';
      
      if (dragOverTaskId !== taskId || dragPosition !== pos) {
        document.querySelectorAll('.task-card').forEach(el => el.classList.remove('drag-above', 'drag-below'));
        e.currentTarget.classList.add('drag-' + pos);
        dragOverTaskId = taskId;
        dragPosition = pos;
      }
    }
    
    function handleTaskDrop(e, targetTaskId, bucket) {
      e.preventDefault();
      e.stopPropagation();

      if (!draggedTaskId || draggedTaskId === targetTaskId) return;

      // Validate dragged task exists
      const draggedTask = state.tasks.find(t => t.id === draggedTaskId);
      if (!draggedTask) {
        // Reset drag state
        draggedTaskId = null;
        dragOverTaskId = null;
        dragPosition = null;
        return;
      }

      // Remove from current position
      state.tasks = state.tasks.filter(t => t.id !== draggedTaskId);

      // Update bucket
      draggedTask.bucket = bucket;

      // Find target index and insert
      const targetIdx = state.tasks.findIndex(t => t.id === targetTaskId);

      // Handle targetIdx === -1 gracefully (target not found, append to end)
      if (targetIdx === -1) {
        state.tasks.push(draggedTask);
      } else {
        const insertIdx = dragPosition === 'below' ? targetIdx + 1 : targetIdx;
        state.tasks.splice(insertIdx, 0, draggedTask);
      }

      saveData();
      render();
    }
    
    function handleTaskListDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('drag-over');
    }

    function handleTaskListDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    function handleTaskListDrop(e, bucket) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');

      if (!draggedTaskId) return;

      // If dropped on empty area (not on a task), add to end
      if (!dragOverTaskId) {
        const task = state.tasks.find(t => t.id === draggedTaskId);
        if (task) {
          task.bucket = bucket;
          saveData();
        }
      }

      render();
    }

    // ========== FIREBASE CLOUD SYNC ==========
    let firebaseApp = null;
    let firebaseDb = null;
    let firebaseListener = null;
    let isReceivingUpdate = false; // Prevent sync loops
    let syncDebounceTimer = null;

    // Generate 8-character alphanumeric Sync ID
    function generateSyncId() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Removed ambiguous chars (0, O, 1, I, l)
      let id = '';
      for (let i = 0; i < 8; i++) {
        id += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return id;
    }

    function getSyncData() {
      return {
        contacts: state.contacts,
        tasks: state.tasks,
        buckets: state.buckets,
        lastModified: Date.now(),
        version: 2
      };
    }

    // Initialize Firebase with user's config
    function initializeFirebase(config) {
      try {
        if (firebaseApp) {
          // Already initialized
          return true;
        }

        // Validate config
        if (!config || !config.databaseURL || !config.apiKey) {
          throw new Error('Invalid Firebase config. Need apiKey and databaseURL.');
        }

        firebaseApp = firebase.initializeApp(config);
        firebaseDb = firebase.database();
        state.firebaseConfig = config;
        saveFirebaseConfig();
        return true;
      } catch (err) {
        console.error('Firebase init error:', err);
        showToast('Firebase init failed: ' + err.message);
        return false;
      }
    }

    // Create new Sync ID and push initial data
    async function createNewSync() {
      if (!firebaseDb) {
        showToast('Configure Firebase first');
        return;
      }

      const newSyncId = generateSyncId();
      state.syncStatus = 'syncing';
      render();

      try {
        const ref = firebaseDb.ref('planners/' + newSyncId);
        await ref.set({
          ...getSyncData(),
          createdAt: Date.now(),
          deviceCount: 1
        });

        state.syncId = newSyncId;
        state.syncEnabled = true;
        state.lastSynced = new Date().toISOString();
        state.syncStatus = 'connected';
        state.deviceCount = 1;
        saveSyncSettings();

        // Start real-time listener
        startRealtimeSync();

        render();
        showToast('Sync created! Your Sync ID: ' + newSyncId);

      } catch (err) {
        console.error('Create sync error:', err);
        state.syncStatus = 'error';
        render();
        showToast('Failed to create sync: ' + err.message);
      }
    }

    // Join existing Sync ID
    async function joinSyncId(syncId) {
      if (!firebaseDb) {
        showToast('Configure Firebase first');
        return;
      }

      const cleanId = syncId.trim().toUpperCase();
      if (cleanId.length !== 8) {
        showToast('Sync ID must be 8 characters');
        return;
      }

      state.syncStatus = 'connecting';
      render();

      try {
        const ref = firebaseDb.ref('planners/' + cleanId);
        const snapshot = await ref.once('value');

        if (!snapshot.exists()) {
          throw new Error('Sync ID not found. Check the code and try again.');
        }

        const data = snapshot.val();

        // Validate data structure
        if (!data || typeof data !== 'object') {
          throw new Error('Invalid sync data');
        }

        // Apply remote data
        if (Array.isArray(data.contacts)) state.contacts = data.contacts;
        if (Array.isArray(data.tasks)) state.tasks = data.tasks;
        if (Array.isArray(data.buckets) && data.buckets.length > 0) state.buckets = data.buckets;

        // Update device count
        const newDeviceCount = (data.deviceCount || 1) + 1;
        await ref.update({ deviceCount: newDeviceCount });

        state.syncId = cleanId;
        state.syncEnabled = true;
        state.lastSynced = new Date().toISOString();
        state.syncStatus = 'connected';
        state.deviceCount = newDeviceCount;

        saveData();
        saveSyncSettings();

        // Start real-time listener
        startRealtimeSync();

        render();
        showToast('Connected! Synced ' + state.contacts.length + ' contacts, ' + state.tasks.length + ' tasks');

      } catch (err) {
        console.error('Join sync error:', err);
        state.syncStatus = 'error';
        render();
        showToast('Failed to connect: ' + err.message);
      }
    }

    // Start real-time listener
    function startRealtimeSync() {
      if (!firebaseDb || !state.syncId) return;

      // Remove existing listener
      stopRealtimeSync();

      const ref = firebaseDb.ref('planners/' + state.syncId);

      firebaseListener = ref.on('value', (snapshot) => {
        if (!snapshot.exists()) return;

        const data = snapshot.val();

        // Skip if this is our own update
        if (isReceivingUpdate) return;

        // Check if remote data is newer
        const remoteModified = data.lastModified || 0;
        const localModified = state.lastSynced ? new Date(state.lastSynced).getTime() : 0;

        // Only apply if remote is newer (with 500ms buffer to avoid race conditions)
        if (remoteModified > localModified + 500) {
          isReceivingUpdate = true;

          // Apply remote data
          if (Array.isArray(data.contacts)) state.contacts = data.contacts;
          if (Array.isArray(data.tasks)) state.tasks = data.tasks;
          if (Array.isArray(data.buckets) && data.buckets.length > 0) state.buckets = data.buckets;
          state.deviceCount = data.deviceCount || 1;
          state.lastSynced = new Date().toISOString();
          state.syncStatus = 'connected';

          // Save to localStorage (without triggering push)
          try {
            localStorage.setItem('admin_planner_data_v4', JSON.stringify({
              contacts: state.contacts,
              tasks: state.tasks,
              buckets: state.buckets,
              apiKey: state.apiKey,
              braveApiKey: state.braveApiKey
            }));
          } catch (e) {
            console.error('Failed to save synced data:', e);
          }

          render();

          setTimeout(() => { isReceivingUpdate = false; }, 100);
        }
      }, (err) => {
        console.error('Realtime sync error:', err);
        state.syncStatus = 'error';
        render();
      });

      // Monitor connection state
      const connectedRef = firebaseDb.ref('.info/connected');
      connectedRef.on('value', (snap) => {
        if (snap.val() === true) {
          state.syncStatus = 'connected';
        } else {
          state.syncStatus = 'disconnected';
        }
        render();
      });
    }

    // Stop real-time listener
    function stopRealtimeSync() {
      if (firebaseListener && firebaseDb && state.syncId) {
        firebaseDb.ref('planners/' + state.syncId).off('value', firebaseListener);
        firebaseListener = null;
      }
    }

    // Push local changes to Firebase (debounced)
    function pushToFirebase() {
      if (!firebaseDb || !state.syncId || !state.syncEnabled) return;
      if (isReceivingUpdate) return; // Don't push while receiving

      clearTimeout(syncDebounceTimer);
      syncDebounceTimer = setTimeout(async () => {
        try {
          state.syncStatus = 'syncing';
          render();

          const ref = firebaseDb.ref('planners/' + state.syncId);
          await ref.update(getSyncData());

          state.lastSynced = new Date().toISOString();
          state.syncStatus = 'connected';
          saveSyncSettings();
          render();
        } catch (err) {
          console.error('Push to Firebase error:', err);
          state.syncStatus = 'error';
          render();
        }
      }, 300); // 300ms debounce
    }

    // Disconnect from sync
    function disconnectSync() {
      if (!confirm('Disconnect from cloud sync? Your local data will be kept.')) return;

      // Decrement device count
      if (firebaseDb && state.syncId) {
        const ref = firebaseDb.ref('planners/' + state.syncId + '/deviceCount');
        ref.transaction((count) => Math.max(0, (count || 1) - 1));
      }

      stopRealtimeSync();

      state.syncId = '';
      state.syncEnabled = false;
      state.syncStatus = null;
      state.deviceCount = 0;
      state.lastSynced = null;

      saveSyncSettings();
      render();
      showToast('Disconnected from sync');
    }

    // Save Firebase config to localStorage
    function saveFirebaseConfig() {
      try {
        if (state.firebaseConfig) {
          localStorage.setItem('admin_planner_firebase_config', JSON.stringify(state.firebaseConfig));
        }
      } catch (e) {
        console.error('Failed to save Firebase config:', e);
      }
    }

    // Load Firebase config from localStorage
    function loadFirebaseConfig() {
      try {
        const saved = localStorage.getItem('admin_planner_firebase_config');
        if (saved) {
          const config = JSON.parse(saved);
          if (config && config.apiKey && config.databaseURL) {
            state.firebaseConfig = config;
            initializeFirebase(config);
            return true;
          }
        }
      } catch (e) {
        console.error('Failed to load Firebase config:', e);
      }
      return false;
    }

    // Save sync settings to localStorage
    function saveSyncSettings() {
      try {
        localStorage.setItem('admin_planner_sync_v5', JSON.stringify({
          syncId: state.syncId,
          syncEnabled: state.syncEnabled,
          lastSynced: state.lastSynced,
          deviceCount: state.deviceCount
        }));
      } catch (e) {
        console.error('Failed to save sync settings:', e);
      }
    }

    // Load sync settings from localStorage
    function loadSyncSettings() {
      try {
        const saved = localStorage.getItem('admin_planner_sync_v5');
        if (saved) {
          const data = JSON.parse(saved);
          state.syncId = data.syncId || '';
          state.syncEnabled = data.syncEnabled || false;
          state.lastSynced = data.lastSynced || null;
          state.deviceCount = data.deviceCount || 0;

          // If we have a sync ID and Firebase is configured, reconnect
          if (state.syncId && state.firebaseConfig && firebaseDb) {
            startRealtimeSync();
            state.syncStatus = 'connecting';
          }
        }
      } catch (e) {
        console.error('Failed to load sync settings:', e);
      }
    }

    // Helper to copy Sync ID to clipboard
    function copySyncId() {
      if (state.syncId) {
        navigator.clipboard.writeText(state.syncId).then(() => {
          showToast('Sync ID copied!');
        }).catch(() => {

    // Setup Firebase from settings modal
    function setupFirebase() {
      const input = document.getElementById('firebaseConfigInput');
      if (!input || !input.value.trim()) {
        showToast('Please paste your Firebase config');
        return;
      }

      try {
        // Handle both JSON and JavaScript object formats
        let configStr = input.value.trim();

        return;
      }

      state.processing = { status: 'processing', message: 'Understanding your request...' };
      render();

      try {
        // Get today's date for context
        const today = new Date();
        const dateStr = today.toISOString().split('T')[0];
        const dayOfWeek = today.toLocaleDateString('en-US', { weekday: 'long' });

        // Build contact list for matching
        const contactList = state.contacts.map(c => ({ id: c.id, name: c.name, company: c.company }));

        const prompt = `Parse this CRM update request and identify what changes to make.

User input: "${text}"

Today is ${dayOfWeek}, ${dateStr}.

EXISTING CONTACTS:
${contactList.map(c => '- ID ' + c.id + ': ' + c.name + (c.company ? ' (' + c.company + ')' : '')).join('\n')}

Parse the user's input and return JSON with the updates to make:
{
  "updates": [
    {
      "contactId": <number or null if new contact>,
      "contactName": "Name mentioned",
      "changes": {
        "lastContactedDate": "YYYY-MM-DD or null",
        "nextStep": "follow up action or null",
        "nextStepDate": "YYYY-MM-DD or null",
        "strength": "New/Weak/Medium/Strong or null"
      },
      "explanation": "Brief explanation of what will be updated"
    }
  ]
}

RULES:
- Match names flexibly (first name only, partial match, etc.)
- "spoke to X" or "talked to X" or "met X" → set lastContactedDate to today
- "follow up with X by Friday" → set nextStep and nextStepDate
- "reach out to X next week" → set nextStep and calculate nextStepDate
- If multiple contacts mentioned, include multiple updates
- If contact not found, set contactId to null (will show warning)

Return ONLY valid JSON.`;

        const response = await fetch(ANTHROPIC_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': state.apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }]

        });

        if (!response.ok) {

        const data = await response.json();

        if (!content) {
          throw new Error('No response from AI');
        }

        const jsonMatch = content.match(/\{[\s\S]*\}/);
        if (!jsonMatch) {
          throw new Error('Could not parse response');
        }

        const parsed = JSON.parse(jsonMatch[0]);

        if (!parsed.updates || parsed.updates.length === 0) {

      let updatedCount = 0;

      selectedContacts.forEach(c => {

          '<div class="stat-card' + (state.crmFilter === 'all' ? ' active' : '') + '" onclick="setCrmFilter(\'all\')"><div class="stat-value">' + state.contacts.length + '</div><div class="stat-label">Total</div></div>' +
          '<div class="stat-card' + (state.crmFilter === 'overdue' ? ' active' : '') + '" onclick="setCrmFilter(\'overdue\')"><div class="stat-value" style="color:#FCA5A5">' + overdueCount + '</div><div class="stat-label">Overdue</div></div>' +
          '</div>' +
          '<div class="crm-actions">' +
          '<button class="btn btn-secondary btn-sm" onclick="exportContactsCSV()">📊 Export' + (activeFilters > 0 ? ' (' + filteredCrmContacts.length + ')' : '') + '</button>' +
          '<button class="btn btn-primary btn-sm" onclick="openAddContactModal()">+ Add Contact<span class="keyboard-hint"> (C)</span></button>' +
          '</div></div>' +
          (filteredCrmContacts.length === 0 ? '<div class="empty-state" style="padding:40px">No contacts match your filters</div>' : '<div class="contact-list">' + filteredCrmContacts.map(renderContactCard).join('') + '</div>') +
          '</div>';
        })() : '') +
        
        renderModal() +
        (state.toast ? '<div class="toast">' + escapeHtml(state.toast) + '</div>' : '') +
        // Global processing overlay - visible from any screen
        (state.processing && state.processing.status === 'processing' ?
          '<div class="processing-overlay">' +
          '<div class="spinner"></div>' +
          '<div class="message">' + escapeHtml(state.processing.message) + '</div>' +
          '<div class="submessage">Please wait...</div>' +
          '</div>'
          : ''); 
      
      // Restore ALL scroll positions
      requestAnimationFrame(() => {
        // Restore window scroll
        window.scrollTo(0, windowScrollY);

        // Restore kanban horizontal scroll
        if (kanbanScrollLeft) {
          const newKanban = document.querySelector('.kanban-container');
          if (newKanban) newKanban.scrollLeft = kanbanScrollLeft;
        }

        // Restore today section scroll
        if (todaySectionScroll) {
          const newTodaySection = document.querySelector('.today-section');
          if (newTodaySection) newTodaySection.scrollTop = todaySectionScroll;
        }

        // Restore CRM scroll
        if (crmScroll) {
          const newCrmContainer = document.querySelector('.crm-container');
          if (newCrmContainer) newCrmContainer.scrollTop = crmScroll;
        }

        // Restore contact list scroll
        if (contactListScroll) {
          const newContactList = document.querySelector('.contact-list');
          if (newContactList) newContactList.scrollTop = contactListScroll;
        }
      });

      // Restore search input focus and cursor position
      if (wasSearchFocused) {
        const searchInput = document.querySelector('.search-bar input');
        if (searchInput) {
          searchInput.focus();
          searchInput.setSelectionRange(searchCursorPos, searchCursorEnd);
        }
      }
    }

    // Initialize
    loadData();
    loadFirebaseConfig(); // Load Firebase config first
    loadSyncSettings();   // Then load sync settings (will start real-time sync if configured)
    render();

    // Auto-reconnect to Firebase sync on startup
    if (state.syncId && state.syncEnabled && firebaseDb) {
      setTimeout(() => {
        startRealtimeSync();
      }, 500);
    }

    // === EVENT LISTENERS (attached once, not in render) ===

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      // ESC closes modal
      if (e.key === 'Escape' && state.modal) {
        closeModal();
        return;
      }

      // Don't trigger shortcuts when typing in inputs
      if (e.target.matches('input, textarea, select')) return;

      // N - New task (opens add task modal for first bucket)
      if (e.key === 'n' || e.key === 'N') {
        if (!state.modal && state.view === 'kanban' && state.buckets.length > 0) {
          e.preventDefault();
          openAddTaskModal(state.buckets[0]);
        }
      }

      // / - Focus search
      if (e.key === '/') {
        const searchInput = document.querySelector('.search-bar input');
        if (searchInput && !state.modal) {
          e.preventDefault();
          searchInput.focus();
        }
      }

      // C - New contact (in CRM view)
      if ((e.key === 'c' || e.key === 'C') && state.view === 'crm' && !state.modal) {
        e.preventDefault();
        openAddContactModal();
      }
    });

    // Wheel scroll on kanban
    document.addEventListener('wheel', e => {
      const k = document.querySelector('.kanban-container');
      if (k && k.contains(e.target)) {
        e.preventDefault();
        k.scrollLeft += e.deltaY;
      }
    }, { passive: false });

    // Drag to scroll kanban
    let isDrag = false, startX, scrollL;
    document.addEventListener('mousedown', e => {
      const k = document.querySelector('.kanban-container');
      if (!k) return;
      if (e.target.closest('.task-card') || e.target.closest('.add-task-inline') || e.target.closest('.bucket-header')) return;
      if (k.contains(e.target)) {
        isDrag = true;
        startX = e.pageX - k.offsetLeft;
        scrollL = k.scrollLeft;
        k.style.cursor = 'grabbing';
      }
    });

    document.addEventListener('mousemove', e => {
      if (!isDrag) return;
      e.preventDefault();
      const k = document.querySelector('.kanban-container');
      if (!k) return;
      k.scrollLeft = scrollL - (e.pageX - k.offsetLeft - startX) * 1.5;
    });

    document.addEventListener('mouseup', () => {
      isDrag = false;
      const k = document.querySelector('.kanban-container');
      if (k) k.style.cursor = 'grab';
    });

    // Reset drag state on window blur (Phase 4 fix)
    window.addEventListener('blur', () => {
      isDrag = false;
      draggedTaskId = null;
      dragOverTaskId = null;
      dragPosition = null;
      document.querySelectorAll('.task-card').forEach(el => el.classList.remove('dragging', 'drag-above', 'drag-below'));
      document.querySelectorAll('.task-list').forEach(el => el.classList.remove('drag-over'));
    });

    // Auto-focus input fields in modals
    const modalObserver = new MutationObserver(() => {
      const modal = document.querySelector('.modal');
      if (modal) {
        const firstInput = modal.querySelector('input[type="text"]:not([type="hidden"]), textarea');
        if (firstInput && document.activeElement !== firstInput) {
          setTimeout(() => firstInput.focus(), 50);
        }
      }
    });
    modalObserver.observe(document.getElementById('app'), { childList: true, subtree: true });

    // Touch swipe support for kanban on mobile
    let touchStartX = 0;
    let touchStartScrollLeft = 0;
    document.addEventListener('touchstart', e => {
      const k = document.querySelector('.kanban-container');
      if (k && k.contains(e.target) && !e.target.closest('.task-card')) {
        touchStartX = e.touches[0].clientX;
        touchStartScrollLeft = k.scrollLeft;
      }
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      const k = document.querySelector('.kanban-container');
      if (k && touchStartX && k.contains(e.target) && !e.target.closest('.task-card')) {
        const diff = touchStartX - e.touches[0].clientX;
        k.scrollLeft = touchStartScrollLeft + diff;
      }
    }, { passive: true });

    document.addEventListener('touchend', () => {
      touchStartX = 0;
    });

    // Cleanup Firebase sync on page unload
    window.addEventListener('beforeunload', () => {
      if (firebaseDb && state.syncId && state.syncEnabled) {
        // Try to decrement device count (best effort, may not complete)
        const ref = firebaseDb.ref('planners/' + state.syncId + '/deviceCount');
        ref.transaction((count) => Math.max(0, (count || 1) - 1));
        stopRealtimeSync();
      }
    });
  </script>
</body>
</html>
